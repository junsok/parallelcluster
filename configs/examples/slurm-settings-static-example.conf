# Slurm custom settings example for Static GPU Cluster
# Example only - do not use production values directly
#

#
# Basic scheduling
#
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

#
# Accounting / logging example
#
JobCompType=jobcomp/filetxt
JobCompLoc=/var/log/slurm/jobcomp.log

#
# Scheduler tuning example
#
SchedulerType=sched/backfill
SchedulerParameters=bf_continue,bf_interval=30

#
# Node state handling example
#
ReturnToService=2

#
# Proctrack / task plugin example
#
ProctrackType=proctrack/cgroup
TaskPlugin=task/cgroup

#
# Static GPU environment note
#
# - Fixed compute node environment
# - Often used with MinCount = MaxCount
# - Capacity Reservation may be used depending on architecture
#
